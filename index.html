<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idôneos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .banner {
      background: url('https://via.placeholder.com/1200x300') no-repeat center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgb(45, 10, 245);
      font-size: 2em;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .product img {
      max-width: 100%;
      border-radius: 8px;
    }

    .product h3 {
      margin: 10px 0;
    }

    .price {
      color: #e63946;
      font-size: 1.2em;
      margin: 10px 0;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
    
  <h1><img src="Logo/Idoneos128.ico" alt="logo" style="width:32px; vertical-align:middle;"> Idôneos</h1>
</header>

<div class="banner">
  Estilo que combina com você
</div>

<div class="container">
  <h2>Produtos</h2>

  <div class="products" id="product-container">
    <!-- Os produtos serão carregados dinamicamente aqui -->
  </div>
</div>

<footer>
  © 2026 Idôneos - Todos os direitos reservados
</footer>

<!-- Importa a lista de produtos -->
<script src="produtos_dados.js"></script>

<script>
  function carregarProdutos() {
    const container = document.getElementById('product-container');
    
    try {
      // listaProdutos vem do arquivo produtos_dados.js
      if (typeof listaProdutos === 'undefined') {
        throw new Error('A variável listaProdutos não foi encontrada.');
      }

      container.innerHTML = ''; // Limpa o container antes de carregar

      listaProdutos.forEach((img, index) => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';
        
        const productName = img.split('.')[0]
          .replace('Modelo', 'Produto ')
          .replace('modelo', 'Produto ')
          .replace(/(\d+)/, ' $1') // Adiciona espaço antes de números
          .trim();

        productDiv.innerHTML = `
          <img src="produtos/${img}" alt="${productName}">
          <h3>${productName}</h3>
          <p class="price">R$ ${((index + 1) * 10 + 39.90).toFixed(2).replace('.', ',')}</p>
          <button onclick="comprar('${productName}')">Comprar</button>
        `;
        
        container.appendChild(productDiv);
      });
    } catch (error) {
      console.error('Erro ao carregar produtos:', error);
      container.innerHTML = '<p>Erro ao carregar os produtos. Verifique se o arquivo produtos_dados.js existe.</p>';
    }
  }

  // Chama a função ao carregar a página
  carregarProdutos();

  function comprar(produto) {
    alert("Você escolheu: " + produto);
  }
</script>

</body>
</html>
