<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idôneos</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    
  <h1><img src="Logo/Idoneos128.ico" alt="logo" style="width:32px; vertical-align:middle;"> Idôneos</h1>
</header>

<div class="banner">
  Estilo que combina com você
</div>

<div class="container">
  <h2>Produtos</h2>

  <div class="products" id="product-container">
    <!-- Os produtos serão carregados dinamicamente aqui -->
  </div>
</div>

<footer>
  © 2026 Idôneos - Todos os direitos reservados
</footer>

<!-- Importa a lista de produtos -->
<script src="produtos_dados.js" charset="utf-8"></script>

<script>
  function carregarProdutos() {
    const container = document.getElementById('product-container');
    
    try {
      // listaProdutos vem do arquivo produtos_dados.js
      if (typeof listaProdutos === 'undefined') {
        throw new Error('A variável listaProdutos não foi encontrada.');
      }

      container.innerHTML = ''; // Limpa o container antes de carregar

      listaProdutos.forEach((produto) => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';
        
        const productName = produto.nome || produto.imagem;

        productDiv.innerHTML = `
          <img src="produtos/${produto.imagem}" alt="${productName}">
          <h3>${productName}</h3>
          <p class="price">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
          <button onclick="comprar('${productName}')">Comprar</button>
        `;
        
        container.appendChild(productDiv);
      });
    } catch (error) {
      console.error('Erro ao carregar produtos:', error);
      container.innerHTML = '<p>Erro ao carregar os produtos. Verifique se o arquivo produtos_dados.js existe.</p>';
    }
  }

  // Chama a função ao carregar a página
  carregarProdutos();

  function comprar(produto) {
    alert("Você escolheu: " + produto);
  }
</script>

</body>
</html>
