<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idôneos</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .banner {
      background: url('https://via.placeholder.com/1200x300') no-repeat center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgb(45, 10, 245);
      font-size: 2em;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      max-width: 1200px;
      margin: auto;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .product img {
      max-width: 100%;
      border-radius: 8px;
    }

    .product h3 {
      margin: 10px 0;
    }

    .price {
      color: #e63946;
      font-size: 1.2em;
      margin: 10px 0;
    }

    button {
      background: #111;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
    
  <h1><img src="Logo/Idoneos128.ico" alt="logo" style="width:32px; vertical-align:middle;"> Idôneos</h1>
</header>

<div class="banner">
  Estilo que combina com você
</div>

<div class="container">
  <h2>Produtos</h2>

  <div class="products">
    
    <div class="product">
      <img src="Camisetas/Modelo1.jfif" alt="Camiseta 1">
      <h3>Camiseta Básica Preta</h3>
      <p class="price">R$ 49,90</p>
      <button onclick="comprar('Camiseta Básica Preta')">Comprar</button>
    </div>

    <div class="product">
      <img src="Camisetas/modelo2.jfif" alt="Camiseta 2">
      <h3>Camiseta Azul Premium</h3>
      <p class="price">R$ 59,90</p>
      <button onclick="comprar('Camiseta Azul Premium')">Comprar</button>
    </div>

    <div class="product">
      <img src="Camisetas/modelo3.jfif" alt="Camiseta 3">
      <h3>Camiseta Vermelha</h3>
      <p class="price">R$ 69,90</p>
      <button onclick="comprar('Camiseta Vermelha')">Comprar</button>
    </div>

  </div>
</div>

<footer>
  © 2026 Idôneos - Todos os direitos reservados
</footer>

<script>
  function comprar(produto) {
    alert("Você escolheu: " + produto);
  }
</script>

</body>
</html>
