<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idôneos</title>

  <script>
    // Anti-cache para o CSS
    const link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'style.css?v=' + Date.now();
    document.head.appendChild(link);
  </script>
</head>
<body>

<header>
    
  <h1><img src="Logo/Idoneos128.ico" alt="logo"> Idôneos</h1>
</header>

<div class="banner">
  Adequados para servir
</div>

<div class="container">
  <h2>Produtos</h2>

  <div class="products" id="product-container">
    <!-- Os produtos serão carregados dinamicamente aqui -->
  </div>
</div>

<footer>
  © 2026 Idôneos - Todos os direitos reservados
</footer>

<script>
  function carregarProdutos() {
    const container = document.getElementById('product-container');
    
    try {
      if (typeof listaProdutos === 'undefined') {
        throw new Error('A variável listaProdutos não foi encontrada.');
      }

      container.innerHTML = ''; 

      listaProdutos.forEach((produto, index) => {
        const productDiv = document.createElement('div');
        productDiv.className = 'product';
        
        const productName = produto.nome || produto.principal;

        productDiv.innerHTML = `
          <a href="detalhes.html?id=${index}" class="product-link">
            <img src="produtos/${produto.principal}" alt="${productName}">
            <div class="product-info">
              <h3>${productName}</h3>
              <p class="price">R$ ${produto.preco.toFixed(2).replace('.', ',')}</p>
            </div>
          </a>
        `;
        
        container.appendChild(productDiv);
      });
    } catch (error) {
      console.error('Erro ao carregar produtos:', error);
      container.innerHTML = '<p>Erro ao carregar os produtos.</p>';
    }
  }

  // Carregamento dinâmico com anti-cache
  const script = document.createElement('script');
  script.src = 'produtos_dados.js?v=' + Date.now();
  script.charset = 'utf-8';
  script.onload = carregarProdutos;
  document.head.appendChild(script);
</script>

</body>
</html>
